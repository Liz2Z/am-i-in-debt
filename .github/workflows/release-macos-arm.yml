name: Build and Release (macOS Apple Silicon)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string
      release_name:
        description: "Release name"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain (aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build sidecar binary
        run: |
          bun run build:sidecar
          cp src-tauri/bin/get-cookies src-tauri/bin/get-cookies-aarch64-apple-darwin
          chmod +x src-tauri/bin/get-cookies src-tauri/bin/get-cookies-aarch64-apple-darwin

      - name: Verify sidecar artifact exists
        run: test -x src-tauri/bin/get-cookies-aarch64-apple-darwin

      - name: Build Tauri app for macOS Apple Silicon
        run: bun run tauri build -- --target aarch64-apple-darwin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.release_name || github.event.inputs.tag }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg.sig
