name: Build and Release (macOS Apple Silicon)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string
      release_name:
        description: "Release name"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    # 使用 ARM64 runner，避免交叉编译问题
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build sidecar for Apple Silicon
        run: bun run build:sidecar:macos-arm

      - name: Build Tauri app for macOS Apple Silicon
        run: bun run tauri build

      - name: Verify sidecar bundled into app
        run: |
          # Tauri sidecar 在 MacOS 目录，不是 Resources
          SIDECAR_PATH="src-tauri/target/release/bundle/macos/Am I In Debt.app/Contents/MacOS/get-cookies-aarch64-apple-darwin"
          if [[ ! -f "$SIDECAR_PATH" ]]; then
            echo "Expected sidecar not found: $SIDECAR_PATH" >&2
            exit 1
          fi
          file "$SIDECAR_PATH"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.release_name || github.event.inputs.tag }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
